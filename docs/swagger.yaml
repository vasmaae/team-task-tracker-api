    put:
      consumes:
      - application/json
      parameters:
      - description: Team ID
        in: path
        name: id
        required: true
        type: integer
      - description: Worker ID
        in: path
        name: worker_id
        required: true
        type: integer
      - description: Worker data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.workerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/team-task-tracker-api_internal_repository.Worker'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.errorResponse'
        "403":
