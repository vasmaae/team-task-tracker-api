          schema:
            $ref: '#/definitions/internal_httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Update worker
      tags:
      - Workers
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Enter the token with the `Bearer ` prefix, for example: Bearer eyJ...'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
