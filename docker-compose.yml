services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: /app/config.yaml
      DATABASE_DSN: postgres://tracker:tracker@postgres:5432/tracker?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret
      EMAIL_ENDPOINT: smtp://mailpit:1025
    depends_on:
      - postgres
      - redis
      - mailpit
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"
      - "8025:8025"
  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      - api
volumes:
  pgdata:
